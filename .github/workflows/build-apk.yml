name: Build SPH HelpDesk APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/sph-helpdesk.keystore

      - name: Build Release APK
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/sph-helpdesk.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias=sph-helpdesk \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/*.apk output/SPH-HelpDesk.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SPH-HelpDesk-Release-APK
          path: output/SPH-HelpDesk.apk
          retention-days: 90
